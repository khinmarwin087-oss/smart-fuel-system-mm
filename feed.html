<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNS - Booking Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #F2F2F7; font-family: -apple-system, sans-serif; }
        .full-page { transform: translateY(100%); transition: 0.4s ease; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; }
        .full-page.active { transform: translateY(0); }
        .countdown-badge { background: #FFF0E6; color: #FF6B00; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 800; }
        .nav-active { color: #007AFF !important; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-white sticky top-0 z-40 border-b p-4 flex justify-between items-center">
        <h1 class="text-xl font-black">YNS Booking Feed</h1>
        <div id="userState" class="text-[10px] font-bold text-gray-400">စစ်ဆေးနေသည်...</div>
    </div>

    <div id="feedContainer" class="max-w-md mx-auto p-5 space-y-4">
        <p class="text-center text-gray-400 py-10">သတင်းများ ရယူနေပါသည်...</p>
    </div>

    <div id="detailPage" class="full-page">
        <div class="max-w-md mx-auto pb-20">
            <button onclick="closeDetail()" class="absolute top-6 left-6 z-10 w-10 h-10 bg-black/20 text-white rounded-full flex items-center justify-center">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <img id="detImg" class="w-full aspect-square object-cover bg-gray-200">
            
            <div class="p-8 space-y-6">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img id="detUserImg" class="w-12 h-12 rounded-full border bg-gray-100">
                        <div>
                            <h2 id="detName" class="text-lg font-black text-gray-800"></h2>
                            <p id="detCar" class="text-blue-600 font-bold text-xs"></p>
                        </div>
                    </div>
                    <div id="seatBadge" class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-bold"></div>
                </div>

                <div id="detInfo" class="bg-gray-50 p-5 rounded-3xl text-sm whitespace-pre-line leading-relaxed text-gray-600 border border-gray-100"></div>

                <div class="p-4 bg-blue-50 rounded-2xl">
                    <p class="text-[10px] font-bold text-blue-400 uppercase">Driver ဖုန်းနံပါတ်</p>
                    <p id="detPhone" class="text-xl font-black text-blue-700 mt-1"></p>
                </div>

                <div id="driverView" class="hidden space-y-4 border-t pt-6">
                    <p class="font-black text-gray-400 text-xs uppercase tracking-widest">လိုက်ပါရန် Request တောင်းထားသူများ</p>
                    <div id="requestList" class="space-y-3"></div>
                </div>

                <div id="passengerView" class="hidden space-y-4 border-t pt-6">
                    <p class="font-black text-gray-400 text-xs uppercase tracking-widest">လိုက်ပါရန် စာရင်းသွင်းပါ</p>
                    
                    <div id="paxCamUI" class="hidden bg-black rounded-3xl overflow-hidden aspect-video relative shadow-xl">
                        <video id="paxVideo" class="w-full h-full object-cover" autoplay playsinline></video>
                        <button onclick="takePaxPhoto()" class="absolute bottom-4 left-1/2 -translate-x-1/2 w-14 h-14 bg-white rounded-full border-4 border-gray-300 shadow-lg"></button>
                    </div>

                    <img id="paxPreview" class="hidden w-full rounded-3xl aspect-video object-cover border-2 border-blue-100 shadow-md">
                    
                    <button onclick="startPaxCamera()" id="camBtn" class="w-full py-4 bg-gray-100 text-gray-700 rounded-2xl font-bold text-sm border-2 border-dashed border-gray-300">
                        <i class="fa-solid fa-camera mr-2"></i> Selfie ရိုက်ပါ
                    </button>
                    
                    <button id="reqBtn" onclick="sendRequest()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition-all">
                        Request ပို့မည်
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around items-center z-50 px-4">
        <a href="index.html" class="text-gray-400 flex flex-col items-center gap-1">
            <i class="fa-solid fa-house text-lg"></i><span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="post.html" class="text-gray-400 flex flex-col items-center gap-1">
            <i class="fa-solid fa-plus-circle text-lg"></i><span class="text-[10px] font-bold">Post</span>
        </a>
        <a href="feed.html" class="nav-active flex flex-col items-center gap-1">
            <i class="fa-solid fa-rss text-lg"></i><span class="text-[10px] font-bold">Feed</span>
        </a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDe5bR1dlr_CD5pI8JE7RF0fJ9qJ0FL2Ew",
            authDomain: "yns-taxi.firebaseapp.com",
            databaseURL: "https://yns-taxi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yns-taxi",
            appId: "1:390164927701:web:4769bafcc71d440e5b3e5c"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let selectedPostId = null;
        let selectedPostData = null;
        let paxSelfie = null;
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userState').innerText = user.displayName;
            } else {
                window.location.href = "index.html";
            }
        });

        // Load Feed
        onValue(ref(db, 'yns_posts'), s => {
            const container = document.getElementById('feedContainer');
            container.innerHTML = "";
            const data = s.val();
            if(!data) {
                container.innerHTML = "<p class='text-center text-gray-400 py-10'>တင်ထားသော ပို့စ်မရှိသေးပါ။</p>";
                return;
            }

            Object.entries(data).sort((a,b)=>b[1].ts - a[1].ts).forEach(([id, p]) => {
                const timeLeft = p.expireAt - Date.now();
                if(timeLeft <= 0) return;

                const mins = Math.floor(timeLeft / 60000);
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-[30px] shadow-sm space-y-3 relative active:scale-95 transition-transform border border-white";
                card.onclick = () => window.openDetail(id, p);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-2">
                            <img src="${p.userImg || 'https://via.placeholder.com/100'}" class="w-6 h-6 rounded-full border">
                            <p class="text-[11px] font-black text-gray-800">${p.userName}</p>
                        </div>
                        <div class="countdown-badge"><i class="fa-regular fa-clock mr-1"></i>${mins}m left</div>
                    </div>
                    <div class="flex justify-between items-center px-1">
                        <p class="text-sm font-black text-gray-700">
                            ${p.from || 'Location'} <i class="fa-solid fa-arrow-right text-[10px] mx-1 text-gray-300"></i> ${p.to || 'Dest'}
                        </p>
                        <p class="text-[11px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">💺 ${p.availableSeats} နေရာကျန်</p>
                    </div>
                    <img src="${p.selfieData}" class="w-full aspect-video object-cover rounded-[20px]">
                `;
                container.appendChild(card);
            });
        });

        // Global functions for Button clicks
        window.openDetail = (id, post) => {
            selectedPostId = id;
            selectedPostData = post;
            document.getElementById('detImg').src = post.selfieData;
            document.getElementById('detUserImg').src = post.userImg || '';
            document.getElementById('detName').innerText = post.userName;
            document.getElementById('detCar').innerText = "ယာဉ်နံပါတ်: " + post.carNo;
            document.getElementById('detPhone').innerText = post.phone || 'မရှိပါ';
            document.getElementById('seatBadge').innerText = post.availableSeats + " Seats Left";
            document.getElementById('detInfo').innerText = post.note || "မှတ်ချက်မရှိပါ။";

            const isDriver = post.uid === currentUser?.uid;
            document.getElementById('driverView').classList.toggle('hidden', !isDriver);
            document.getElementById('passengerView').classList.toggle('hidden', isDriver);

            if(isDriver) loadRequests(id);
            document.getElementById('detailPage').classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeDetail = () => {
            document.getElementById('detailPage').classList.remove('active');
            document.body.style.overflow = 'auto';
            paxSelfie = null;
            document.getElementById('paxPreview').classList.add('hidden');
            document.getElementById('paxCamUI').classList.add('hidden');
        };

        // Driver: Load Requests
        function loadRequests(postId) {
            const list = document.getElementById('requestList');
            list.innerHTML = "<p class='text-[10px] text-center text-gray-400'>ရှာနေပါသည်...</p>";
            
            onValue(ref(db, `yns_requests/${postId}`), s => {
                list.innerHTML = "";
                if(!s.exists()) {
                    list.innerHTML = "<p class='text-center text-xs text-gray-300 py-4'>လိုက်မည့်သူ မရှိသေးပါ။</p>";
                    return;
                }
                Object.entries(s.val()).forEach(([reqId, r]) => {
                    const item = document.createElement('div');
                    item.className = "bg-gray-50 border p-4 rounded-2xl flex items-center justify-between";
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <img src="${r.selfie}" class="w-10 h-10 rounded-xl object-cover border-2 border-white shadow-sm">
                            <div>
                                <p class="text-xs font-black text-gray-800">${r.name}</p>
                                <p class="text-[9px] font-bold ${r.status==='accepted'?'text-green-500':'text-orange-500'} uppercase">${r.status}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${r.status === 'pending' ? `
                                <button onclick="handleRequest('${reqId}', 'accepted')" class="bg-green-500 text-white px-3 py-2 rounded-xl text-[10px] font-bold">Accept</button>
                                <button onclick="handleRequest('${reqId}', 'rejected')" class="bg-red-500 text-white px-3 py-2 rounded-xl text-[10px] font-bold">Reject</button>
                            ` : `<i class="fa-solid fa-check-circle text-green-500"></i>`}
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        window.handleRequest = async (reqId, status) => {
            if(status === 'accepted') {
                if(selectedPostData.availableSeats <= 0) return alert("နေရာမကျန်တော့ပါ");
                await update(ref(db, `yns_posts/${selectedPostId}`), {
                    availableSeats: selectedPostData.availableSeats - 1
                });
            }
            await update(ref(db, `yns_requests/${selectedPostId}/${reqId}`), { status: status });
        };

        // Passenger: Camera
        window.startPaxCamera = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('paxVideo').srcObject = stream;
                document.getElementById('paxCamUI').classList.remove('hidden');
                document.getElementById('camBtn').classList.add('hidden');
            } catch (e) { alert("Camera ဖွင့်မရပါ"); }
        };

        window.takePaxPhoto = () => {
            const canvas = document.createElement('canvas');
            const video = document.getElementById('paxVideo');
            canvas.width = 400; canvas.height = 300;
            canvas.getContext('2d').drawImage(video, 0,0,400,300);
            paxSelfie = canvas.toDataURL('image/jpeg', 0.6);
            document.getElementById('paxPreview').src = paxSelfie;
            document.getElementById('paxPreview').classList.remove('hidden');
            document.getElementById('paxCamUI').classList.add('hidden');
            video.srcObject.getTracks().forEach(t=>t.stop());
        };

        window.sendRequest = async () => {
            if(!paxSelfie) return alert("Selfie ရိုက်ပေးပါ");
            if(selectedPostData.availableSeats <= 0) return alert("နေရာမကျန်တော့ပါ");

            await push(ref(db, `yns_requests/${selectedPostId}`), {
                uid: currentUser.uid,
                name: currentUser.displayName,
                selfie: paxSelfie,
                status: 'pending',
                ts: Date.now()
            });
            alert("Request ပို့ပြီးပါပြီ။ Driver လက်ခံလျှင် ဖုန်းဆက်သွယ်ပါ။");
            window.closeDetail();
        };

    </script>
</body>
</html>
