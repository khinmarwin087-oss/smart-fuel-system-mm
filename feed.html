<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe5bR1dlr_CD5pI8JE7RF0fJ9qJ0FL2Ew",
            authDomain: "yns-taxi.firebaseapp.com",
            databaseURL: "https://yns-taxi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yns-taxi",
            appId: "1:390164927701:web:4769bafcc71d440e5b3e5c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'yns_posts'), (snap) => {
            const container = document.getElementById('feedContainer');
            container.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, post]) => {
                    container.innerHTML += `
                        <div class="bg-white p-5 rounded-[24px] shadow-sm mb-4 border border-white">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[9px] font-black px-2 py-0.5 rounded uppercase ${post.category==='fuel'?'bg-blue-100 text-blue-600':'bg-green-100 text-green-600'}">${post.category}</span>
                                <button onclick="window.del('${id}')" class="text-gray-300 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                            <p class="text-[15px] font-medium text-gray-800 leading-snug">${post.content}</p>
                            <p class="text-[10px] text-gray-400 mt-3 font-semibold tracking-tighter">${post.time}</p>
                        </div>`;
                });
            }
        });

        window.del = (id) => confirm("ဖျက်မှာလား?") && remove(ref(db, `yns_posts/${id}`));
    </script>
    <style>body { background: #F2F2F7; font-family: -apple-system, sans-serif; }</style>
</head>
<body class="pb-24">
    <div class="max-w-md mx-auto p-6 space-y-6">
        <h1 class="text-3xl font-black mt-4 tracking-tight">News Feed</h1>
        <div id="feedContainer"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white border-t flex justify-around items-center px-6">
        <a href="index.html" class="text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">Home</span></a>
        <a href="post.html" class="text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-plus-circle text-xl"></i><span class="text-[10px] font-bold">Post</span></a>
        <a href="feed.html" class="text-blue-600 flex flex-col items-center gap-1"><i class="fa-solid fa-rss text-xl"></i><span class="text-[10px] font-bold">Feed</span></a>
    </nav>
</body>
</html>
