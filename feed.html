<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNS Premium Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #F2F2F7; font-family: -apple-system, sans-serif; }
        .apple-card { background: white; border-radius: 30px; border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 4px 15px rgba(0,0,0,0.03); transition: 0.3s; }
        .apple-card:active { transform: scale(0.98); }
        .route-line { border-left: 2px dashed #E5E5E5; margin-left: 7px; height: 20px; }
        .modal-bg { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); }
        .badge-blue { background: #EBF5FF; color: #007AFF; }
        .badge-green { background: #F0FDF4; color: #16A34A; }
    </style>
</head>
<body class="pb-28">

    <div class="max-w-md mx-auto p-5">
        <header class="flex justify-between items-center py-6">
            <div>
                <h1 class="text-3xl font-black tracking-tight">Feed</h1>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Active Routes & Fuel</p>
            </div>
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-magnifying-glass text-gray-300 text-sm"></i>
            </div>
        </header>

        <div id="feedContainer" class="space-y-6">
            <div class="text-center py-20 text-gray-400 text-xs font-bold uppercase tracking-widest">Loading Feed...</div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[100] modal-bg flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[40px] overflow-hidden relative shadow-2xl animate-slide-up p-8">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6" onclick="closeModal()"></div>
            
            <div class="flex items-center gap-4 mb-6">
                <img id="modalUserImg" src="" class="w-14 h-14 rounded-full border-2 border-blue-500 p-0.5">
                <div>
                    <h3 id="modalUserName" class="font-black text-lg text-gray-800"></h3>
                    <p id="modalCarNo" class="text-xs text-blue-600 font-bold uppercase tracking-tight"></p>
                </div>
            </div>

            <div class="space-y-6">
                <div id="modalContent" class="text-gray-700 text-sm leading-relaxed bg-gray-50 p-5 rounded-3xl whitespace-pre-line"></div>
                <img id="modalImg" src="" class="w-full aspect-video object-cover rounded-[24px] shadow-sm border">
                
                <div class="flex justify-between items-center border-t pt-4">
                    <span class="text-[10px] font-black text-gray-400 uppercase" id="modalTime"></span>
                    <button onclick="closeModal()" class="bg-black text-white px-8 py-3 rounded-2xl font-bold text-sm">ပိတ်မည်</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/90 backdrop-blur-lg border-t border-gray-100 flex justify-around items-center px-6 z-50">
        <a href="index.html" class="text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">Home</span></a>
        <a href="post.html" class="text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-plus-circle text-xl"></i><span class="text-[10px] font-bold">Post</span></a>
        <a href="feed.html" class="text-blue-600 flex flex-col items-center gap-1"><i class="fa-solid fa-rss text-xl"></i><span class="text-[10px] font-bold">Feed</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe5bR1dlr_CD5pI8JE7RF0fJ9qJ0FL2Ew",
            authDomain: "yns-taxi.firebaseapp.com",
            databaseURL: "https://yns-taxi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yns-taxi",
            appId: "1:390164927701:web:4769bafcc71d440e5b3e5c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'yns_posts'), (snap) => {
            const feed = document.getElementById('feedContainer');
            feed.innerHTML = "";
            const data = snap.val();
            
            if (data) {
                Object.entries(data).sort((a,b) => b[1].ts - a[1].ts).forEach(([id, post]) => {
                    const timeLeft = post.expireAt - Date.now();
                    if (timeLeft > 0) {
                        const mins = Math.floor(timeLeft / 60000);
                        const displayTime = mins > 60 ? Math.floor(mins/60) + " နာရီအလို" : mins + " မိနစ်အလို";
                        
                        // Extract Start and End from content string if formatted
                        const lines = post.content.split('\n');
                        const from = lines[0] || "မသိပါ";
                        const to = lines[1] || "မသိပါ";

                        feed.innerHTML += `
                            <div class="apple-card p-5 space-y-4" onclick='showDetails(${JSON.stringify(post).replace(/'/g, "&apos;")})'>
                                <div class="flex justify-between items-start">
                                    <div class="flex items-center gap-3">
                                        <img src="${post.userImg}" class="w-10 h-10 rounded-full border border-gray-100">
                                        <div>
                                            <p class="text-xs font-black text-gray-800">${post.userName}</p>
                                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-md ${post.category === 'fuel' ? 'badge-blue' : 'badge-green'} uppercase">${post.category}</span>
                                        </div>
                                    </div>
                                    <span class="text-[9px] font-black text-orange-500 bg-orange-50 px-2 py-1 rounded-full"><i class="fa-regular fa-clock mr-1"></i>${displayTime}</span>
                                </div>

                                <div class="space-y-1 px-1">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-location-dot text-blue-500 text-[10px]"></i>
                                        <p class="text-sm font-bold text-gray-700">${from.replace('📍 မှ: ', '')}</p>
                                    </div>
                                    <div class="route-line"></div>
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-flag-checkered text-red-500 text-[10px]"></i>
                                        <p class="text-sm font-bold text-gray-700">${to.replace('🏁 သို့: ', '')}</p>
                                    </div>
                                </div>

                                <div class="relative rounded-2xl overflow-hidden aspect-video shadow-sm">
                                    <img src="${post.selfieData}" class="w-full h-full object-cover">
                                    <div class="absolute bottom-2 right-2 bg-black/50 backdrop-blur-md px-2 py-1 rounded-lg">
                                        <p class="text-[9px] text-white font-bold uppercase"><i class="fa-solid fa-car mr-1"></i>${post.carNo}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
            } else {
                feed.innerHTML = "<div class='text-center py-20 text-gray-400'>သတင်းမရှိသေးပါ</div>";
            }
        });

        window.showDetails = (post) => {
            document.getElementById('modalImg').src = post.selfieData;
            document.getElementById('modalUserImg').src = post.userImg;
            document.getElementById('modalUserName').innerText = post.userName;
            document.getElementById('modalCarNo').innerText = "Verified Account: " + post.carNo;
            document.getElementById('modalContent').innerText = post.content;
            document.getElementById('modalTime').innerText = "Posted: " + post.time;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };
    </script>
</body>
</html>
