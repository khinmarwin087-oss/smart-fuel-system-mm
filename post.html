<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNS Secure Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #F2F2F7; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .apple-card { background: white; border-radius: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .input-box { background: #F9F9F9; border-radius: 14px; border: 1px solid #E5E5E5; padding: 12px 16px; width: 100%; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #007AFF; background: white; }
        
        /* Custom Toast Animation */
        #toast { visibility: hidden; min-width: 250px; background-color: rgba(0,0,0,0.8); color: #fff; text-align: center; border-radius: 20px; padding: 16px; position: fixed; z-index: 100; left: 50%; bottom: 100px; transform: translateX(-50%); backdrop-filter: blur(10px); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 100px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 100px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="pb-28">

    <div id="toast">Message here</div>

    <div class="max-w-md mx-auto p-6 space-y-6">
        <header class="pt-4">
            <h1 class="text-3xl font-black tracking-tight text-gray-900">Post Details</h1>
            <p class="text-xs font-bold text-gray-400 uppercase mt-1">သေချာစွာ ဖြည့်စွက်ပေးပါ</p>
        </header>

        <div class="apple-card p-6 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">From</label>
                    <input id="fromPlace" placeholder="အစ (ဥပမာ- လှိုင်)" class="input-box text-sm">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">To</label>
                    <input id="toPlace" placeholder="အဆုံး (ဥပမာ- ရန်ကင်း)" class="input-box text-sm">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">Passenger Limit</label>
                    <select id="paxLimit" class="input-box text-sm appearance-none">
                        <option value="1">၁ ယောက်</option>
                        <option value="2">၂ ယောက်</option>
                        <option value="3">၃ ယောက်</option>
                        <option value="4">၄ ယောက်</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">Expire Time</label>
                    <input type="datetime-local" id="expireTime" class="input-box text-xs">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-500 ml-2 uppercase">Note / Description</label>
                <textarea id="postNote" placeholder="ထပ်တိုးအချက်အလက်များ..." class="input-box text-sm h-20 resize-none"></textarea>
            </div>

            <div id="camUI" class="hidden rounded-3xl overflow-hidden bg-black aspect-square relative shadow-inner">
                <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                <button onclick="takePhoto()" class="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white/20 backdrop-blur-md rounded-full border-4 border-white shadow-xl"></button>
            </div>
            <img id="previewImg" class="hidden w-full rounded-3xl aspect-square object-cover shadow-md border-4 border-white">

            <button onclick="startCamera()" class="w-full py-4 bg-gray-100 text-gray-800 rounded-2xl font-bold text-sm transition active:scale-95">
                <i class="fa-solid fa-camera mr-2"></i> Selfie Verification ရိုက်ပါ
            </button>

            <div class="flex gap-3 pt-2">
                <button id="sendBtnFuel" onclick="sendPost('fuel')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition">ဆီဆိုင်တင်မည်</button>
                <button id="sendBtnCarpool" onclick="sendPost('carpool')" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-200 active:scale-95 transition">လမ်းကြုံတင်မည်</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-white/80 backdrop-blur-lg border-t border-gray-100 flex justify-around items-center px-6 z-50">
        <a href="index.html" class="text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">Home</span></a>
        <a href="post.html" class="text-blue-600 flex flex-col items-center gap-1"><i class="fa-solid fa-plus-circle text-xl"></i><span class="text-[10px] font-bold">Post</span></a>
        <a href="feed.html" class="text-gray-400 flex flex-col items-center gap-1"><i class="fa-solid fa-rss text-xl"></i><span class="text-[10px] font-bold">Feed</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDe5bR1dlr_CD5pI8JE7RF0fJ9qJ0FL2Ew",
            authDomain: "yns-taxi.firebaseapp.com",
            databaseURL: "https://yns-taxi-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "yns-taxi",
            appId: "1:390164927701:web:4769bafcc71d440e5b3e5c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let userCarNo = "N/A";
        let capturedImg = null;

        // Custom Toast Function
        window.showToast = (msg) => {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        };

        onAuthStateChanged(auth, async (u) => {
            if (!u) window.location.href = "index.html";
            const s = await get(child(ref(db), `users/${u.uid}`));
            if(s.exists()) userCarNo = s.val().carNo;
        });

        window.startCamera = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
                document.getElementById('camUI').classList.remove('hidden');
            } catch(e) { showToast("Camera ဖွင့်၍မရပါ"); }
        };

        window.takePhoto = () => {
            const canvas = document.createElement('canvas');
            const video = document.getElementById('video');
            canvas.width = 400; canvas.height = 400;
            canvas.getContext('2d').drawImage(video, 0, 0, 400, 400);
            capturedImg = canvas.toDataURL('image/jpeg', 0.5);
            document.getElementById('previewImg').src = capturedImg;
            document.getElementById('previewImg').classList.remove('hidden');
            document.getElementById('camUI').classList.add('hidden');
            video.srcObject.getTracks().forEach(t => t.stop());
        };

        window.sendPost = async (cat) => {
            const from = document.getElementById('fromPlace').value;
            const to = document.getElementById('toPlace').value;
            const pax = document.getElementById('paxLimit').value;
            const note = document.getElementById('postNote').value;
            const ex = document.getElementById('expireTime').value;

            if(!from || !to || !ex || !capturedImg) return showToast("⚠️ အချက်အလက်စုံလင်စွာ ဖြည့်ပါ");

            document.getElementById('sendBtnFuel').disabled = true;
            document.getElementById('sendBtnCarpool').disabled = true;
            
            showToast("⏳ တင်နေပါသည်...");

            const fullContent = `📍 မှ: ${from} \n🏁 သို့: ${to} \n👥 လူဦးရေ: ${pax} ယောက် \n📝 မှတ်ချက်: ${note}`;

            await push(ref(db, 'yns_posts'), {
                content: fullContent,
                category: cat,
                userName: auth.currentUser.displayName,
                userImg: auth.currentUser.photoURL,
                carNo: userCarNo,
                selfieData: capturedImg,
                expireAt: new Date(ex).getTime(),
                time: new Date().toLocaleString(),
                ts: Date.now()
            });

            showToast("✅ အောင်မြင်စွာ တင်ပြီးပါပြီ");
            setTimeout(() => { window.location.href = "feed.html"; }, 1500);
        };
    </script>
</body>
</html>
